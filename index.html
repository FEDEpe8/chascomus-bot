<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MuniBot Chascomús</title>
    <meta name="theme-color" content="#004a7c">
    
    <meta name="author" content="Federico de Sistemas - Municipalidad de Chascomús">
    <meta name="copyright" content="Municipalidad de Chascomús">
    <meta name="description" content="Asistente Virtual Oficial desarrollado por el área de Sistemas.">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        /* --- ESTILO MUNI (Azul y Verde) --- */
        :root { --primary: #004a7c; --accent: #97d700; --bg: #f4f7f6; --gray: #95a5a6; }
        
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        header { background: var(--primary); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header-left { display: flex; align-items: center; }
        .header-logo { height: 40px; width: 40px; border-radius: 50%; background: white; padding: 2px; object-fit: contain; }
        .header-title { font-weight: bold; font-size: 1rem; margin-left: 10px; }
        
        /* BOTONES HEADER */
        .header-actions { display: flex; gap: 10px; }
        .btn-header { background:rgba(255,255,255,0.2); border:none; color:white; border-radius:4px; padding:5px 10px; font-size:0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-info { border-radius: 50%; width: 30px; height: 30px; font-size: 1rem; font-weight: bold; }

        /* CHAT AREA */
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 120px; scroll-behavior: smooth; }
        
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; animation: fadeIn 0.3s; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .bot { background: white; align-self: flex-start; border-bottom-left-radius: 2px; color: #333; }
        .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        /* Links en mensajes */
        .bot a { color: var(--primary); font-weight: bold; text-decoration: none; }
        .wa-link { color: #25D366 !important; }

        /* BOTONES DE OPCIONES */
        .options-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .option-button { background: white; border: 1.5px solid var(--primary); color: var(--primary); padding: 10px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex: 1 1 auto; text-align: center; }
        .option-button:hover { background: #eef6fc; transform: translateY(-1px); }
        .option-button.back { border-color: var(--gray); color: var(--gray); }

        /* BARRA DE INPUT FLOTANTE */
        .input-area { position: fixed; bottom: -100px; left: 10px; right: 10px; background: white; padding: 8px; border-radius: 30px; display: flex; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
        .input-area.show { bottom: 20px; }
        #userInput { flex: 1; border: none; outline: none; padding: 10px 15px; font-size: 16px; background: transparent; }
        #sendButton { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; color: var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* TARJETAS ESPECIALES */
        .info-card { background: #eef6fc; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); margin-top: 5px; font-size: 0.9rem; }
        .wa-btn { display: block; background-color: #25D366; color: white !important; padding: 12px; border-radius: 8px; text-decoration: none !important; font-weight: bold; margin-top: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* MODAL DE INFORMACIÓN */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; animation: fadeIn 0.2s; }
        .modal.show { display: flex; }
        .modal-content { background-color: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; font-weight: bold; color: #aaa; cursor: pointer; }
        .modal-h3 { color: var(--primary); margin-top: 0; }
        .modal-p { font-size: 0.9rem; color: #555; line-height: 1.5; margin-bottom: 15px; }
        /* El DIV del autor debe estar vacío para que el script funcione */
        .modal-credit { font-size: 0.85rem; color: #777; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

    /* --- LÓGICA DE INTERFAZ Y NAVEGACIÓN --- */
    
    function toggleInfo() {
        const modal = document.getElementById('infoModal');
        modal.classList.toggle('show');
    }

    window.onclick = function(event) {
        const modal = document.getElementById('infoModal');
        if (event.target == modal) {
            modal.classList.remove('show');
        }
    }
    
    function toggleInput(show) { 
        document.getElementById('inputBar').classList.toggle('show', show);
        if(show) setTimeout(() => document.getElementById('userInput').focus(), 100);
    }

    function addMessage(text, side = 'bot', options = null) {
        const container = document.getElementById('chatMessages');
        const row = document.createElement('div');
        row.style.width = '100%';
        row.style.display = 'flex';
        row.style.flexDirection = 'column';
        
        const div = document.createElement('div');
        div.className = `message ${side}`;
        div.innerHTML = text;
        row.appendChild(div);

        if (options) {
            const optDiv = document.createElement('div');
            optDiv.className = 'options-container';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `option-button ${opt.id === 'back' ? 'back' : ''}`;
                btn.innerText = opt.label;
                btn.onclick = () => handleAction(opt);
                optDiv.appendChild(btn);
            });
            row.appendChild(optDiv);
        }
        
        container.appendChild(row);
        setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
    }

    function handleAction(opt) {
        if (opt.id === 'nav_home') return resetToMain();
        if (opt.id === 'nav_back') {
            if (currentPath.length > 1) {
                currentPath.pop();
                showMenu(currentPath[currentPath.length - 1]);
            } else {
                showMenu('main');
            }
            return;
        }

        if (opt.id === 'back') {
            if (currentPath.length > 1) {
                currentPath.pop();
                showMenu(currentPath[currentPath.length - 1]);
            } else {
                showMenu('main');
            }
            return;
        }

        if (opt.link) {
            window.open(opt.link, '_blank');
            return;
        }

        addMessage(opt.label, 'user');

        if (opt.type === 'form_147') {
            startReclamoForm();
            return;
        }

        if (opt.type === 'leaf' || opt.apiKey) {
            const content = RES[opt.apiKey] || "Información no disponible.";
            setTimeout(() => {
                addMessage(content, 'bot');
                showNavControls(); 
            }, 500);
            return;
        }

        if (MENUS[opt.id]) {
            currentPath.push(opt.id);
            showMenu(opt.id);
        }
    }

    function showMenu(key) {
        toggleInput(false); 
        const menu = MENUS[key];
        const title = typeof menu.title === 'function' ? menu.title(userName) : menu.title;
        
        let opts = [...menu.options];
        if (currentPath.length > 1) opts.push({ id: 'back', label: '⬅️ Volver' });
        
        setTimeout(() => addMessage(title, 'bot', opts), 400);
    }

    function showNavControls() {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'nav-controls';
        
        div.innerHTML = `
            <button class="nav-btn btn-back" onclick="handleAction({id:'nav_back'})">⬅ Volver</button>
            <button class="nav-btn btn-home" onclick="handleAction({id:'nav_home'})">🏠 Inicio</button>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

            const firma = `
            <div class="info-card" style="border-left: 5px solid #000; background: #fff;">
                👨‍💻 <b>Desarrollo Original</b><br><br>
                Este sistema fue diseñado y programado por:<br>
                <b>Federico Perez Speroni</b><br>
                <i>Municipalidad de Chascomús</i><br>
                © 2024 - Todos los derechos reservados.
            </div>`;
            addMessage(val, 'user');
            setTimeout(() => addMessage(firma, 'bot'), 500);
            input.value = "";
            return;
        }

        if (isAwaitingForm) {
            addMessage(val, 'user');
            input.value = "";
            processFormStep(val);
            return;
        }

        if (!userName) {
            addMessage(val, 'user');
            userName = val;
            localStorage.setItem('muni_user_name', val);
            input.value = "";
            showMenu('main');
        } else {
            addMessage(val, 'user');
            input.value = "";
            setTimeout(() => addMessage("Por favor, utilizá los botones del menú para navegar.", 'bot'), 600);
        }
    }

    function resetToMain() {
        currentPath = ['main'];
        showMenu('main');
    }

    function clearSession() {
        if(confirm("¿Cerrar sesión y borrar nombre?")) {
            localStorage.removeItem('muni_user_name');
            location.reload();
        }
    }

    document.getElementById('sendButton').onclick = processInput;
    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') processInput(); };

    window.onload = () => {
        if (!userName) {
            addMessage("👋 Bienvenido al asistente de Chascomús.<br>Para comenzar, por favor <b>ingresá tu nombre</b>:", 'bot');
            toggleInput(true);
        } else {
            showMenu('main');
        }
    };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
